name: Build and Push Docker Image

on:
  push:
    branches:
      - main  # main 브랜치에 코드가 push될 때만 실행
  # pull_request:
  #   branches:
  #     - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Docker Hub의 본인 계정 ID와 이미지 이름을 적어줍니다.
          # 예: ${{ secrets.DOCKERHUB_USERNAME }}/ml-api-server:latest
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ml-api-server:latest
          push: true
          # 캐싱을 활용해 빌드 속도 최적화
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/ml-api-server:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/ml-api-server:buildcache,mode=max

  deploy-to-local:
    needs: build-and-push
    runs-on: self-hosted
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      
      - name: Set up Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Kill existing server on port 8000
        shell: powershell
        run: |
          $process = Get-NetTCPConnection -LocalPort 8000 -ErrorAction SilentlyContinue | Select-Object -ExpandProperty OwningProcess -First 1
          if ($process) {
              Stop-Process -Id $process -Force
              Write-Output "Stopped process on port 8000"
          }
        
      - name: Start new uvicorn server (Background)
        shell: powershell
        run: |
          Start-Process -FilePath "python" -ArgumentList "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000" -WindowStyle Hidden
          Write-Output "New Handwriting-API server started successfully!"
