name: Local Native Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    # 윈도우 로컬 컴퓨터(self-hosted runner)에서 직접 실행
    runs-on: self-hosted
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      
      - name: Set up Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Kill existing server on port 8000
        shell: powershell
        run: |
          $process = Get-NetTCPConnection -LocalPort 8000 -ErrorAction SilentlyContinue | Select-Object -ExpandProperty OwningProcess -First 1
          if ($process) {
              Stop-Process -Id $process -Force
              Write-Output "Stopped existing uvicorn process"
          }
        
      - name: Start new uvicorn server (Background)
        shell: powershell
        run: |
          # 백그라운드 프로세스로 실행
          Start-Process -FilePath "python" -ArgumentList "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000" -WindowStyle Hidden
          Write-Output "Handwriting AI Server restarted successfully on Local PC!"
