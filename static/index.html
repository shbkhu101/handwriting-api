<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwriting AI Recognition</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.15) 0%, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: floatIn 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes floatIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        .upload-area {
            border: 2px dashed #475569;
            border-radius: 16px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            transform: scale(1.02);
        }

        .upload-area img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            display: none;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
            position: relative;
            z-index: 2;
        }

        .upload-text {
            color: #cbd5e1;
            position: relative;
            z-index: 2;
        }

        input[type="file"] {
            display: none;
        }

        .btn-predict {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 12px;
            margin-top: 30px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(99, 102, 241, 0.39);
        }

        .btn-predict:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }

        .btn-predict:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Loading Spinner */
        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Result Area */
        .result-container {
            margin-top: 30px;
            padding: 20px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 12px;
            border: 1px solid #334155;
            display: none;
            text-align: left;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-label {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .result-text {
            font-size: 1.3rem;
            color: #f1f5f9;
            line-height: 1.6;
            word-break: keep-all;
        }
        
    </style>
</head>
<body>

    <div class="container">
        <h1>Handwriting AI</h1>
        <p class="subtitle">사진을 올리면 인공지능이 텍스트로 변환해 줍니다</p>

        <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <span class="upload-icon">📸</span>
            <span class="upload-text" id="upload-text">여기를 클릭하거나 이미지를 드래그 앤 드롭 하세요</span>
            <img id="image-preview" src="" alt="Preview">
            <input type="file" id="file-input" accept="image/*">
        </div>

        <button class="btn-predict" id="btn-predict" disabled>
            <span id="btn-text">텍스트 변환하기</span>
            <div class="loader" id="loader"></div>
        </button>

        <div class="result-container" id="result-container">
            <div class="result-label">추출된 텍스트</div>
            <div class="result-text" id="result-text"></div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const uploadText = document.getElementById('upload-text');
        const uploadIcon = document.querySelector('.upload-icon');
        const imagePreview = document.getElementById('image-preview');
        const btnPredict = document.getElementById('btn-predict');
        const btnText = document.getElementById('btn-text');
        const loader = document.getElementById('loader');
        const resultContainer = document.getElementById('result-container');
        const resultText = document.getElementById('result-text');

        let selectedFile = null;

        // 드래그 앤 드롭 효과
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // 클릭을 통한 파일 선택
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('이미지 파일만 업로드 가능합니다!');
                return;
            }
            selectedFile = file;
            
            // 미리보기
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreview.src = e.target.result;
                imagePreview.style.display = 'block';
                uploadText.style.display = 'none';
                uploadIcon.style.display = 'none';
                btnPredict.disabled = false;
                resultContainer.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        // 인공지능 예측 요청
        btnPredict.addEventListener('click', async () => {
            if (!selectedFile) return;

            // 로딩 상태 시작
            btnPredict.disabled = true;
            btnText.style.display = 'none';
            loader.style.display = 'block';
            resultContainer.style.display = 'none';

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) throw new Error('서버 에러가 발생했습니다.');
                
                const data = await response.json();
                
                // 결과 출력
                resultText.textContent = data.predicted_text || "글씨를 찾지 못했습니다.";
                resultContainer.style.display = 'block';

            } catch (error) {
                alert(error.message);
            } finally {
                // 상태 복구
                btnPredict.disabled = false;
                btnText.style.display = 'block';
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
